services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: xettuyenptit_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: xettuyenptitnodejs
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - xettuyenptit_network

  # Backend API
  backend:
    build: ./backend
    container_name: xettuyenptit_backend
    restart: unless-stopped
    environment:
      PORT: 8080
      CLIENT_URL: http://localhost:5173
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: appuser
      DB_PASSWORD: apppassword
      DB_NAME: xettuyenptitnodejs
      JWT_SECRET: your_jwt_secret_change_me
      JWT_EXPIRES_IN: 8h
      DEFAULT_PASSWORD: 123456
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - xettuyenptit_network

  # Frontend
  frontend:
    build: ./frontend
    container_name: xettuyenptit_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
    networks:
      - xettuyenptit_network

volumes:
  mysql_data:


networks:
  xettuyenptit_network:
    driver: bridge
